version: '3.9'

# medic - Local Development Stack
# Run: docker-compose up -d
# All services start with hot-reload via Spring DevTools

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres-patients:
    image: postgres:15-alpine
    container_name: medic-postgres-patients
    environment:
      POSTGRES_DB: medic_patients
      POSTGRES_USER: medic
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-patients-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medic -d medic_patients"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-emr:
    image: postgres:15-alpine
    container_name: medic-postgres-emr
    environment:
      POSTGRES_DB: medic_emr
      POSTGRES_USER: medic
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-emr-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medic -d medic_emr"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-appointments:
    image: postgres:15-alpine
    container_name: medic-postgres-appt
    environment:
      POSTGRES_DB: medic_appointments
      POSTGRES_USER: medic
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres-appt-data:/var/lib/postgresql/data

  postgres-telemedicine:
    image: postgres:15-alpine
    container_name: medic-postgres-tele
    environment:
      POSTGRES_DB: medic_telemedicine
      POSTGRES_USER: medic
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5435:5432"
    volumes:
      - postgres-tele-data:/var/lib/postgresql/data

  postgres-pharmacy:
    image: postgres:15-alpine
    container_name: medic-postgres-pharmacy
    environment:
      POSTGRES_DB: medic_pharmacy
      POSTGRES_USER: medic
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5436:5432"
    volumes:
      - postgres-pharmacy-data:/var/lib/postgresql/data

  postgres-analytics:
    image: postgres:15-alpine
    container_name: medic-postgres-analytics
    environment:
      POSTGRES_DB: medic_analytics
      POSTGRES_USER: medic
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5437:5432"
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: medic-redis
    command: redis-server --requirepass changeme_dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ── Application Services ───────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: medic-api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: changeme_dev
      JWT_SECRET: dev-secret-key-min-256-bits-change-in-production-!!
    depends_on:
      redis:
        condition: service_started
    networks:
      - medic-network

  patient-identity-service:
    build:
      context: ./patient-identity-service
      dockerfile: Dockerfile
    container_name: medic-patient-identity
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-patients
      DB_PORT: 5432
      DB_NAME: medic_patients
      DB_USER: medic
      DB_PASSWORD: changeme_dev
    depends_on:
      postgres-patients:
        condition: service_healthy
    networks:
      - medic-network

  emr-service:
    build:
      context: ./emr-service
      dockerfile: Dockerfile
    container_name: medic-emr
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-emr
      DB_PORT: 5432
      DB_NAME: medic_emr
      DB_USER: medic
      DB_PASSWORD: changeme_dev
    depends_on:
      postgres-emr:
        condition: service_healthy
    networks:
      - medic-network

  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: medic-appointments
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres-appointments
      DB_PORT: 5432
      DB_NAME: medic_appointments
      DB_USER: medic
      DB_PASSWORD: changeme_dev
    depends_on:
      - postgres-appointments
    networks:
      - medic-network

  telemedicine-service:
    build:
      context: ./telemedicine-service
      dockerfile: Dockerfile
    container_name: medic-telemedicine
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres-telemedicine
      DB_PORT: 5432
      DB_NAME: medic_telemedicine
      DB_USER: medic
      DB_PASSWORD: changeme_dev
      TELEMEDICINE_PROVIDER: JITSI
      JITSI_BASE_URL: https://meet.jit.si
    depends_on:
      - postgres-telemedicine
    networks:
      - medic-network

  pharmacy-service:
    build:
      context: ./pharmacy-service
      dockerfile: Dockerfile
    container_name: medic-pharmacy
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres-pharmacy
      DB_PORT: 5432
      DB_NAME: medic_pharmacy
      DB_USER: medic
      DB_PASSWORD: changeme_dev
    depends_on:
      - postgres-pharmacy
    networks:
      - medic-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: medic-analytics
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres-analytics
      DB_PORT: 5432
      DB_NAME: medic_analytics
      DB_USER: medic
      DB_PASSWORD: changeme_dev
    depends_on:
      - postgres-analytics
    networks:
      - medic-network

  # ── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: medic-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - medic-network

  grafana:
    image: grafana/grafana:latest
    container_name: medic-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: changeme_dev
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - medic-network

networks:
  medic-network:
    driver: bridge

volumes:
  postgres-patients-data:
  postgres-emr-data:
  postgres-appt-data:
  postgres-tele-data:
  postgres-pharmacy-data:
  postgres-analytics-data:
  redis-data:
  grafana-data:
