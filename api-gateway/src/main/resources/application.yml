server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: patient-identity-service
          uri: http://patient-identity-service:8081
          predicates:
            - Path=/api/patients/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: emr-service
          uri: http://emr-service:8082
          predicates:
            - Path=/api/records/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"

        - id: appointment-service
          uri: http://appointment-service:8083
          predicates:
            - Path=/api/appointments/**

        - id: telemedicine-service
          uri: http://telemedicine-service:8084
          predicates:
            - Path=/api/telemedicine/**

        - id: pharmacy-service
          uri: http://pharmacy-service:8085
          predicates:
            - Path=/api/pharmacy/**

        - id: analytics-service
          uri: http://analytics-service:8086
          predicates:
            - Path=/api/analytics/**

        - id: auth-service
          uri: http://patient-identity-service:8081
          predicates:
            - Path=/api/auth/**

      default-filters:
        - AddResponseHeader=X-Content-Type-Options, nosniff
        - AddResponseHeader=X-Frame-Options, DENY
        - AddResponseHeader=X-XSS-Protection, 1; mode=block
        - AddResponseHeader=Strict-Transport-Security, max-age=31536000; includeSubDomains

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

healthnet:
  security:
    jwt:
      secret: ${JWT_SECRET:your-very-long-and-secure-secret-key-change-in-production-min-256-bits}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.healthnet: DEBUG
    org.springframework.cloud.gateway: INFO
