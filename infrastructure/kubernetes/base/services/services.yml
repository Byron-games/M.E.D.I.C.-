---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: healthnet
  labels:
    app: api-gateway
spec:
  type: LoadBalancer   # Expose gateway to the internet
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: patient-identity-service
  namespace: healthnet
spec:
  type: ClusterIP      # Internal only – reachable only through the gateway
  selector:
    app: patient-identity-service
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: emr-service
  namespace: healthnet
spec:
  type: ClusterIP
  selector:
    app: emr-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: healthnet
spec:
  type: ClusterIP
  selector:
    app: appointment-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
  namespace: healthnet
spec:
  type: ClusterIP
  selector:
    app: telemedicine-service
  ports:
    - port: 8084
      targetPort: 8084
---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy-service
  namespace: healthnet
spec:
  type: ClusterIP
  selector:
    app: pharmacy-service
  ports:
    - port: 8085
      targetPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: healthnet
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
    - port: 8086
      targetPort: 8086
