apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# Pin image tags in production (never use :latest in prod)
images:
  - name: medic/api-gateway
    newTag: "1.0.0"
  - name: medic/patient-identity-service
    newTag: "1.0.0"
  - name: medic/emr-service
    newTag: "1.0.0"
  - name: medic/appointment-service
    newTag: "1.0.0"
  - name: medic/telemedicine-service
    newTag: "1.0.0"
  - name: medic/pharmacy-service
    newTag: "1.0.0"
  - name: medic/analytics-service
    newTag: "1.0.0"

# Scale up replicas for production
patches:
  - target:
      kind: Deployment
      name: patient-identity-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: emr-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
