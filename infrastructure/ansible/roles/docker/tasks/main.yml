---
# Docker role: installs Docker Engine and Docker Compose on app servers

- name: Remove old Docker versions if present
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Install Docker prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker service
  service:
    name: docker
    state: started
    enabled: true

- name: Add healthnet user to docker group
  user:
    name: healthnet
    groups: docker
    append: true

- name: Configure Docker daemon for security and logging
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "50m",
          "max-file": "5"
        },
        "live-restore": true,
        "no-new-privileges": true,
        "icc": false,
        "userns-remap": "healthnet"
      }
  notify: restart docker

- name: Create Docker network for HealthNet
  docker_network:
    name: healthnet-network
    driver: bridge
  ignore_errors: true

- name: Install Docker SDK for Python (needed for Ansible Docker modules)
  pip:
    name: docker
    state: present
