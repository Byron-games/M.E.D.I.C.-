name: medic CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: medic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean compile -q --no-transfer-progress

      - name: Run Tests with Coverage
        run: mvn verify -q --no-transfer-progress

      - name: Upload Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: '**/target/site/jacoco/jacoco.xml'
          fail_ci_if_error: false

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -Dformat=JSON \
            --no-transfer-progress || true

      - name: Check for HIGH severity vulnerabilities
        run: |
          if [ -f target/dependency-check-report.json ]; then
            HIGH=$(cat target/dependency-check-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          deps = data.get('dependencies', [])
          high = sum(1 for d in deps for v in d.get('vulnerabilities', []) if v.get('severity') == 'HIGH')
          print(high)
            ")
            echo "HIGH severity vulnerabilities found: $HIGH"
            if [ "$HIGH" -gt "0" ]; then
              echo "::warning::$HIGH HIGH severity vulnerabilities found. Review OWASP report."
            fi
          fi
